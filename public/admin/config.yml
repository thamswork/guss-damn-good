backend:
  name: github
  repo: thamswork/guss-damn-good
  branch: main

media_folder: public/images
public_folder: /images
publish_mode: editorial_workflow

collections:

  - name: flavors
    label: "Flavors"
    folder: src/content/flavors
    create: true
    slug: "{{slug}}"
    summary: "{{fields.flavor_name}} — {{fields.status}}"
    fields:
      - { label: "Flavor Name", name: flavor_name, widget: string }
      - { label: "Mood / Number", name: mood_number, widget: string, required: false }
      - { label: "Product Image URL", name: product_image, widget: string, hint: "Paste Cloudinary URL" }
      - { label: "Product Video URL", name: product_video, widget: string, required: false, hint: "Optional: paste video URL (mp4/webm)" }
      - { label: "Description", name: description, widget: text }
      - label: "Category"
        name: category
        widget: select
        options:
          - { label: "Classic", value: "classic" }
          - { label: "Sorbet", value: "sorbet" }
          - { label: "Collab", value: "collab" }
          - { label: "Seasonal", value: "seasonal" }
          - { label: "OEM", value: "oem" }
      - label: "Status"
        name: status
        widget: select
        options:
          - { label: "Current", value: "current" }
          - { label: "Emerging (New)", value: "emerging" }
          - { label: "Archive (Past)", value: "archive" }
      - { label: "In Stock / Available", name: in_stock, widget: boolean, default: true }
      - { label: "Pinned to top (max 2)", name: pinned, widget: boolean, default: false }
      - label: "Availability / Locations"
        name: locations
        widget: list
        field: { label: "Location", name: location, widget: string }
      - { label: "Story Behind the Flavor", name: body, widget: markdown, required: false }

  - name: collections
    label: "Collections"
    folder: src/content/collections
    create: true
    slug: "{{slug}}"
    summary: "{{fields.title}}"
    fields:
      - { label: "Collection Title", name: title, widget: string }
      - { label: "Slug (URL)", name: slug, widget: string, hint: "e.g. summer-2025 — no spaces" }
      - { label: "Hero Image URL", name: hero_image, widget: string }
      - { label: "Hero Video URL", name: hero_video, widget: string, required: false }
      - { label: "Description", name: description, widget: text }
      - { label: "Published?", name: published, widget: boolean, default: true }
      - { label: "Featured on Homepage?", name: featured, widget: boolean, default: false }
      - label: "Flavors in this Collection (slugs)"
        name: flavor_slugs
        widget: list
        field: { label: "Flavor Slug", name: slug, widget: string }
      - label: "Landing Page Content"
        name: body
        widget: markdown
        hint: "Full content for the collection landing page"

  - name: collabs
    label: "Collaborations"
    folder: src/content/collabs
    create: true
    slug: "{{slug}}"
    summary: "{{fields.partner_name}}"
    fields:
      - { label: "Partner Name", name: partner_name, widget: string }
      - { label: "Partner Logo URL", name: partner_logo, widget: string, hint: "Paste Cloudinary URL" }
      - { label: "Hero Image URL", name: hero_image, widget: string }
      - { label: "Hero Video URL", name: hero_video, widget: string, required: false }
      - label: "Project Type"
        name: project_type
        widget: select
        options:
          - { label: "Collab Flavor", value: "collab_flavor" }
          - { label: "OEM / ODM", value: "oem_odm" }
          - { label: "Event Catering", value: "catering" }
          - { label: "Campaign", value: "campaign" }
          - { label: "Wedding", value: "wedding" }
      - { label: "Year", name: year, widget: number }
      - { label: "Flavor Name", name: flavor_name, widget: string, required: false }
      - { label: "Published?", name: published, widget: boolean, default: true }
      - { label: "Featured on Homepage?", name: featured, widget: boolean, default: false }
      - { label: "Case Study Body", name: body, widget: markdown }

  - name: locations
    label: "Locations"
    folder: src/content/locations
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Branch Name", name: title, widget: string }
      - { label: "Published", name: published, widget: boolean, default: true }
      - { label: "Google Maps URL", name: maps_url, widget: string }
      - { label: "Full Address", name: address, widget: text }
      - { label: "Opening Hours", name: hours, widget: string }
      - { label: "Delivery Available?", name: delivery, widget: boolean, default: false }
      - { label: "Hero Image URL", name: hero_image, widget: string, required: false }
      - label: "Formats Available"
        name: formats
        widget: object
        fields:
          - { label: "Scoop", name: scoop, widget: boolean, default: true }
          - { label: "Sundae", name: sundae, widget: boolean, default: false }
          - { label: "Milkshake", name: milkshake, widget: boolean, default: false }
          - { label: "Soft Serve", name: soft_serve, widget: boolean, default: false }
          - { label: "Ice Cream Cake", name: cake, widget: boolean, default: false }
          - { label: "Popsicle", name: popsicle, widget: boolean, default: false }
          - { label: "Dog Friendly", name: woof, widget: boolean, default: false }

  - name: settings
    label: "Site Settings"
    files:
      - name: brand
        label: "Brand & Global"
        file: src/content/settings/brand.json
        fields:
          - { label: "Tagline", name: tagline, widget: string, default: "Feeling-Crafted Ice Cream" }
          - { label: "SEO Description", name: meta_description, widget: text }
          - { label: "Mission Statement", name: mission, widget: text }
          - { label: "Contact Email", name: contact_email, widget: string }
          - { label: "Instagram URL", name: instagram, widget: string, required: false }

  - name: team
    label: "Team"
    folder: src/content/team
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: name, widget: string }
      - { label: "Role", name: role, widget: string }
      - { label: "Headshot URL", name: headshot, widget: string, hint: "Paste Cloudinary URL" }
      - { label: "Bio", name: bio, widget: text, required: false }
