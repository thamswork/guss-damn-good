backend:
  name: github
  repo: thamswork/guss-damn-good
  branch: main
  base_url: https://main.guss-damngood.pages.dev
  auth_endpoint: api/auth

media_folder: public/images
public_folder: /images

collections:

  - name: flavors
    label: "Flavors"
    folder: src/content/flavors
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Flavor Name", name: flavor_name, widget: string }
      - { label: "Mood / Number", name: mood_number, widget: string, required: false }
      - { label: "Product Image URL", name: product_image, widget: string }
      - { label: "Product Video URL", name: product_video, widget: string, required: false }
      - { label: "Description", name: description, widget: text }
      - label: "Category"
        name: category
        widget: select
        options:
          - { label: "Classic", value: "classic" }
          - { label: "Sorbet", value: "sorbet" }
          - { label: "Collab", value: "collab" }
          - { label: "Seasonal", value: "seasonal" }
          - { label: "OEM", value: "oem" }
      - label: "Status"
        name: status
        widget: select
        options:
          - { label: "Current", value: "current" }
          - { label: "Emerging", value: "emerging" }
          - { label: "Archive", value: "archive" }
      - { label: "In Stock", name: in_stock, widget: boolean, default: true }
      - { label: "Pinned to top", name: pinned, widget: boolean, default: false }
      - label: "Where to Get It"
        name: locations
        widget: list
        field: { label: "Location", name: location, widget: string }
      - { label: "Story", name: body, widget: markdown, required: false }

  - name: collections_cms
    label: "Collections"
    folder: src/content/collections
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Slug", name: slug, widget: string }
      - { label: "Hero Image URL", name: hero_image, widget: string }
      - { label: "Hero Video URL", name: hero_video, widget: string, required: false }
      - { label: "Description", name: description, widget: text }
      - { label: "Published", name: published, widget: boolean, default: true }
      - { label: "Featured on Homepage", name: featured, widget: boolean, default: false }
      - { label: "Enable Landing Page", name: landing_page, widget: boolean, default: true }
      - label: "Flavors in Collection"
        name: flavor_slugs
        widget: list
        field: { label: "Flavor Slug", name: slug, widget: string }
      - { label: "Landing Page Content", name: body, widget: markdown }

  - name: collabs
    label: "Collaborations"
    folder: src/content/collabs
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Partner Name", name: partner_name, widget: string }
      - { label: "Partner Logo URL", name: partner_logo, widget: string }
      - { label: "Hero Image URL", name: hero_image, widget: string }
      - { label: "Hero Video URL", name: hero_video, widget: string, required: false }
      - label: "Project Type"
        name: project_type
        widget: select
        options:
          - { label: "Collab Flavor", value: "collab_flavor" }
          - { label: "OEM / ODM", value: "oem_odm" }
          - { label: "Event Catering", value: "catering" }
          - { label: "Campaign", value: "campaign" }
          - { label: "Wedding", value: "wedding" }
      - { label: "Year", name: year, widget: number }
      - { label: "Flavor Name", name: flavor_name, widget: string, required: false }
      - { label: "Published", name: published, widget: boolean, default: true }
      - { label: "Intro", name: intro, widget: text }
      - { label: "The Brief", name: challenge, widget: text }
      - { label: "Process", name: process, widget: text }
      - { label: "The Result", name: result, widget: text }
      - label: "Work Station Photos"
        name: work_station_images
        widget: list
        field: { label: "Image URL", name: url, widget: string }
      - { label: "Work Station Video URL", name: work_station_video, widget: string, required: false }

  - name: locations
    label: "Find Us"
    folder: src/content/locations
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Branch Name", name: name, widget: string }
      - { label: "Address", name: address, widget: text }
      - { label: "Hours", name: hours, widget: string }
      - { label: "Google Maps URL", name: maps, widget: string }
      - { label: "Storefront Thumbnail URL", name: thumb, widget: string }
      - { label: "Delivery Available", name: delivery, widget: boolean, default: false }
      - label: "Formats"
        name: formats
        widget: list
        field: { label: "Format", name: format, widget: string }

  - name: settings
    label: "Settings"
    files:
      - name: brand
        label: "Brand"
        file: src/content/settings/brand.json
        fields:
          - { label: "Tagline", name: tagline, widget: string }
          - { label: "SEO Description", name: meta_description, widget: text }
          - { label: "Contact Email", name: contact_email, widget: string }
